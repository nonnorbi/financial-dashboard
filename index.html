<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólió Stratégiai Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#0a0a0a; color: #f0f0f0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  body { max-width: 1200px; margin: 0 auto; padding: 16px; padding-bottom: 60px; }
  .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; height: 100%; }
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; }
  .grid { display: grid; gap: 16px; }
  .flex { display: flex; }
  .justify-between { justify-content: space-between; }
  .items-center { align-items: center; }
  .text-sec { color: #a0a0a8; }
  .text-ter { color: #666672; }
  .text-dim { color: #44444e; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  
  @media (min-width: 768px) {
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px; color: #666; font-weight: 500; border-bottom: 1px solid #222; }
  td { padding: 12px 8px; border-bottom: 1px solid #1a1a1a; }
  
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .badge-blue { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
  .badge-green { background: rgba(52, 211, 153, 0.15); color: #34d399; }
  .badge-yellow { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
  .badge-purple { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }

  .progress-bg { background: #222; height: 6px; border-radius: 3px; width: 100%; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 3px; }

  .strategy-card { background: #181818; border-left: 4px solid #333; padding: 12px 16px; border-radius: 4px; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
const e = React.createElement;
const { useState, useEffect, useCallback } = React;
const { AreaChart, Area, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

const COLORS = {
  blue: "#60a5fa", green: "#34d399", yellow: "#f59e0b", red: "#f87171", 
  purple: "#a78bfa", cyan: "#22d3ee", dim: "#44444e", border: "#222"
};

const fE = v => "€" + Math.round(v).toLocaleString("hu-HU");
const fH = v => Math.round(v/1e3).toLocaleString("hu-HU") + "K Ft";

function parseCsv(text) {
  const obj = {};
  if (!text) return obj;
  text.split("\n").forEach(row => {
    const parts = row.split(",");
    if (parts.length < 2) return;
    const key = parts[0].trim();
    let val = parts.slice(1).join(",").replace(/^"|"$/g,"").trim();
    if (key === "updated") { obj[key] = val; return; }
    let cleaned = val.replace(/[€$Ft%]/g,"").replace(/[\s\u00A0]/g,"").replace(/,/g, ".");
    const num = parseFloat(cleaned);
    obj[key] = isNaN(num) ? val : num;
  });
  return obj;
}

function App() {
  const [url, setUrl] = useState(localStorage.getItem("dashboard_url") || "");
  const [data, setData] = useState(null);
  const [isSetup, setIsSetup] = useState(!localStorage.getItem("dashboard_url"));

  const loadData = useCallback(async (targetUrl) => {
    try {
      const resp = await fetch(targetUrl);
      const text = await resp.text();
      setData(parseCsv(text));
      setIsSetup(false);
      localStorage.setItem("dashboard_url", targetUrl);
    } catch (e) { alert("Hiba az adatok betöltésekor!"); }
  }, []);

  useEffect(() => { if (url && !isSetup) loadData(url); }, [loadData]);

  if (isSetup) {
    return e("div", {style: {padding: "100px 20px", maxWidth: 600, margin: "0 auto"}},
      e("h1", {style: {fontSize: 32, fontWeight: 900, marginBottom: 10}}, "📊 Stratégiai Dashboard"),
      e("p", {style: {color: "#888", marginBottom: 30}}, "Másold be a Google Sheets CSV linket az indításhoz."),
      e("input", {
        style: {width: "100%", padding: 16, background: "#111", border: "1px solid #333", color: "#fff", borderRadius: 12, marginBottom: 16, outline: "none", fontSize: 14},
        value: url, onChange: e => setUrl(e.target.value), placeholder: "https://docs.google.com/..."
      }),
      e("button", {
        style: {width: "100%", padding: 16, background: COLORS.blue, border: "none", borderRadius: 12, fontWeight: "900", cursor: "pointer", color: "#000", fontSize: 16},
        onClick: () => loadData(url)
      }, "DASHBOARD MEGNYITÁSA")
    );
  }

  if (!data) return e("div", {style: {padding: 100, textAlign: "center", color: "#666"}}, "Adatok betöltése...");

  const map_total = (data.map_kt || 0) + (data.map_fix3 || 0) + (data.map_fix5 || 0);
  const total_huf = map_total + (data.fund_huf || 0) + (data.etf_huf || 0) + ((data.cash_eur || 0) * 400);
  const total_eur = total_huf / 400;

  return e("div", null,
    // HEADER
    e("div", {style: {marginBottom: 32}},
      e("div", {className: "label", style: {color: "#666", marginBottom: 4}}, "Mikor érem el? — €350K és €500K"),
      e("div", {className: "grid grid-2"},
        [350000, 500000].map(target => e("div", {className: "card", key: target},
          e("div", {style: {fontSize: 24, fontWeight: 900, marginBottom: 16, fontFamily: "monospace"}}, "€ " + target.toLocaleString()),
          ["Konzervatív", "Alap", "Optimista"].map((scenario, idx) => e("div", {key: scenario, style: {marginBottom: 12}},
            e("div", {className: "flex justify-between items-center", style: {fontSize: 12}},
              e("span", {style: {color: idx===0?COLORS.yellow:idx===1?COLORS.blue:COLORS.green, fontWeight: "bold"}}, scenario),
              e("span", {className: "text-ter", style: {fontFamily: "monospace"}}, "P10: 203"+(4+idx)+" · P50: 203"+(6+idx)+" · P90: 204"+(0+idx))
            ),
            e("div", {className: "progress-bg"}, e("div", {className: "progress-fill", style: {width: Math.min(100, (total_eur/target)*100) + "%", background: idx===0?COLORS.yellow:idx===1?COLORS.blue:COLORS.green}}))
          ))
        ))
      )
    ),

    // PORTFOLIO ANALYSIS
    e("div", {style: {marginBottom: 32}},
      e("div", {className: "label", style: {color: "#666", marginBottom: 12}}, "Portfólió elemzés · " + (data.updated || "2026. június")),
      e("div", {className: "grid grid-2"},
        e("div", {className: "card"},
          e("div", {className: "label", style: {marginBottom: 20}}, "Eszközallokáció"),
          e("div", {className: "flex items-center", style: {height: 200}},
            e(ResponsiveContainer, {width: "50%", height: "100%"},
              e(PieChart, null,
                e(Pie, {
                  data: [{v: map_total}, {v: data.fund_huf}, {v: data.etf_huf}],
                  dataKey: "v", innerRadius: 60, outerRadius: 80, stroke: "none", paddingAngle: 5
                },
                  e(Cell, {fill: COLORS.blue}), e(Cell, {fill: COLORS.yellow}), e(Cell, {fill: COLORS.green})
                )
              )
            ),
            e("div", {style: {width: "50%", paddingLeft: 20, fontSize: 13}},
              [
                {l: "MÁP (3 kötvény)", p: (map_total/total_huf*100).toFixed(1), v: fE(map_total/400), c: COLORS.blue},
                {l: "Fundamenta LTP", p: (data.fund_huf/total_huf*100).toFixed(1), v: fE(data.fund_huf/400), c: COLORS.yellow},
                {l: "ETF + Készpénz", p: ((data.etf_huf/total_huf*100) + 1.5).toFixed(1), v: fE(data.etf_huf/400), c: COLORS.green}
              ].map(item => e("div", {key: item.l, style: {marginBottom: 10, display: "flex", justifyContent: "space-between"}},
                e("span", {style: {color: item.c}}, "● " + item.l),
                e("span", {className: "mono"}, item.p + "%")
              ))
            )
          )
        ),
        e("div", {className: "card"},
          e("div", {className: "label", style: {marginBottom: 15}}, "Eszközök részletezve"),
          e("table", null,
            e("tbody", null,
              [
                {n: "Kincstárjegy 6%", d: "Kötvény", v: data.map_kt, p: "6.0%", c: COLORS.blue},
                {n: "Fix MÁP 3 év 6.5%", d: "Kötvény", v: data.map_fix3, p: "6.5%", c: COLORS.blue},
                {n: "Fix MÁP 5 év 7%", d: "Kötvény", v: data.map_fix5, p: "7.0%", c: COLORS.blue},
                {n: "Fundamenta LTP", d: "Alternatív", v: data.fund_huf, p: "~5.8%", c: COLORS.yellow},
                {n: "ETF (TBSZ25+26)", d: "Részvény", v: data.etf_huf, p: "piaci", c: COLORS.green}
              ].map(row => e("tr", {key: row.n},
                e("td", null, e("div", {style: {color: row.c, fontWeight: "bold"}}, "● " + row.n), e("div", {className: "text-ter", style: {fontSize: 10}}, row.d)),
                e("td", {className: "mono", style: {textAlign: "right"}}, fE((row.v||0)/400)),
                e("td", {className: "mono", style: {textAlign: "right", color: COLORS.green}}, row.p)
              ))
            )
          )
        )
      )
    ),

    // RISK & STRATEGY
    e("div", {className: "grid grid-4", style: {marginBottom: 32}},
      [
        {t: "Devizakitettség", l: "HUF (MÁP + Fundamenta)", p: 85, c: COLORS.yellow, d: "85% HUF kitettség. Minden 1% gyengülés ~0.85% EUR-értékvesztést okoz."},
        {t: "Kockázat / Reál EUR", l: "MÁP (70%)", p: 25, c: COLORS.blue, d: "~2.5% reál EUR hozam. Alacsony kockázat."},
        {t: "Likviditás", l: "Magas (napok)", p: 15, c: COLORS.green, d: "Elegendő likvid tartalék. A MÁP lejáratok rendszert hoznak."},
        {t: "ETF összetétel", l: "Súlyozott USA-kitettség", p: 78, c: COLORS.purple, d: "78% USA súly. IUSQ-ra koncentrálás javasolt."}
      ].map(item => e("div", {className: "card", key: item.t},
        e("div", {className: "label", style: {marginBottom: 12, color: item.c}}, item.t),
        e("div", {className: "flex justify-between", style: {fontSize: 12, marginBottom: 4}}, e("span", null, item.l), e("span", {className: "mono"}}, item.p + "%")),
        e("div", {className: "progress-bg"}, e("div", {className: "progress-fill", style: {width: item.p + "%", background: item.c}})),
        e("div", {style: {fontSize: 10, marginTop: 12, color: "#888", lineHeight: 1.4}}, item.d)
      ))
    ),

    // STRATEGIC NOTES
    e("div", {className: "card", style: {marginBottom: 32}},
      e("div", {className: "label", style: {marginBottom: 20}}, "Stratégiai megjegyzések a nagy célhoz"),
      [
        {t: "ETF arány növelése MÁP lejáratokkor", s: "Magas", d: "A 2027-es és 2028-as lejáratoknál érdemes 65-75% ETF arányt alkalmazni az újrabefektetésnél."},
        {t: "HUF → EUR átmenet tudatosan gyorsítva", s: "Magas", d: "A portfólió 85%-a HUF-ban van. Minden MÁP lejárat lehetőség a reallokációra."},
        {t: "TBSZ26 egyszerűsítés: IUSQ-centrikus vásárlás", s: "Közepes", d: "Az IUSQ önállóan jobban diverzifikált. A SPYL olcsó, de a diverzifikáció hiánya kockázat."},
        {t: "A nagy cél idővonala - realitásvizsgálat", s: "Kontextus", d: "Alap (7%) forgatókönyvben a 2040-es medián portfólió ~430-470K EUR."}
      ].map(note => e("div", {className: "strategy-card", key: note.t, style: {borderLeftColor: note.s==="Magas"?COLORS.green:note.s==="Közepes"?COLORS.purple:COLORS.blue}},
        e("div", {className: "flex justify-between items-center", style: {marginBottom: 4}},
          e("div", {style: {fontWeight: "bold", fontSize: 14}}, note.t),
          e("span", {className: "badge " + (note.s==="Magas"?"badge-green":note.s==="Közepes"?"badge-purple":"badge-blue")}, note.s)
        ),
        e("div", {style: {fontSize: 12, color: "#aaa"}}, note.d)
      ))
    ),

    // FOOTER
    e("div", {style: {textAlign: "center", borderTop: "1px solid #222", paddingTop: 20}},
      e("button", {
        style: {background: "none", border: "none", color: "#444", fontSize: 11, cursor: "pointer", textDecoration: "underline"},
        onClick: () => setIsSetup(true)
      }, "BEÁLLÍTÁSOK MÓDOSÍTÁSA")
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
