<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólió Stratégiai Dashboard Pro</title>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#0a0a0a; color: #f0f0f0; font-family: 'Inter', sans-serif; }
  body { max-width: 1200px; margin: 0 auto; padding: 20px; padding-bottom: 80px; }
  .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 24px; height: 100%; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .grid { display: grid; gap: 20px; }
  .flex { display: flex; }
  .justify-between { justify-content: space-between; }
  .items-center { align-items: center; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; color: #555; margin-bottom: 16px; display: block; }
  
  @media (min-width: 768px) {
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px; color: #444; font-weight: 600; border-bottom: 1px solid #222; }
  td { padding: 14px 10px; border-bottom: 1px solid #1a1a1a; }
  
  .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .badge-blue { background: rgba(96, 165, 250, 0.1); color: #60a5fa; }
  .badge-green { background: rgba(52, 211, 153, 0.1); color: #34d399; }
  .badge-yellow { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
  .badge-purple { background: rgba(167, 139, 250, 0.1); color: #a78bfa; }

  .progress-bg { background: #1a1a1a; height: 8px; border-radius: 4px; width: 100%; margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 1s ease-in-out; }

  .strategy-card { background: #141414; border-left: 4px solid #333; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 13px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 10px; }

  input, button { font-family: inherit; }
  .setup-input { width: 100%; padding: 16px; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 20px; outline: none; font-size: 14px; }
  .setup-btn { width: 100%; padding: 16px; background: #60a5fa; border: none; border-radius: 12px; fontWeight: 900; cursor: pointer; color: #000; font-size: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
const e = React.createElement;
const { useState, useEffect, useCallback, useMemo } = React;
const { AreaChart, Area, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

const COLORS = {
  blue: "#60a5fa", green: "#34d399", yellow: "#f59e0b", red: "#f87171", 
  purple: "#a78bfa", cyan: "#22d3ee", dim: "#333", border: "#222"
};

const fE = v => "€" + Math.round(v).toLocaleString("hu-HU");
const fH = v => Math.round(v/1e3).toLocaleString("hu-HU") + "K Ft";

function parseCsv(text) {
  const obj = {};
  if (!text) return obj;
  text.split("\n").forEach(row => {
    const parts = row.split(",");
    if (parts.length < 2) return;
    const key = parts[0].trim();
    let val = parts.slice(1).join(",").replace(/^"|"$/g,"").trim();
    if (key === "updated") { obj[key] = val; return; }
    let cleaned = val.replace(/[€$Ft%]/g,"").replace(/[\s\u00A0]/g,"").replace(/,/g, ".");
    const num = parseFloat(cleaned);
    obj[key] = isNaN(num) ? val : num;
  });
  return obj;
}

function App() {
  const [url, setUrl] = useState(localStorage.getItem("dashboard_url") || "");
  const [data, setData] = useState(null);
  const [isSetup, setIsSetup] = useState(!localStorage.getItem("dashboard_url"));

  const loadData = useCallback(async (targetUrl) => {
    if (!targetUrl) return;
    try {
      const resp = await fetch(targetUrl + "&t=" + Date.now());
      const text = await resp.text();
      setData(parseCsv(text));
      setIsSetup(false);
      localStorage.setItem("dashboard_url", targetUrl);
    } catch (err) { alert("Hiba az adatok betöltésekor! Ellenőrizd a linket."); }
  }, []);

  useEffect(() => { if (url && !isSetup) loadData(url); }, [loadData, isSetup, url]);

  if (isSetup) {
    return e("div", {style: {padding: "100px 20px", maxWidth: 600, margin: "0 auto"}},
      e("h1", {style: {fontSize: 36, fontWeight: 900, marginBottom: 12}}, "📊 Portfólió Pro"),
      e("p", {style: {color: "#666", marginBottom: 40, lineHeight: 1.6}}, "A professzionális befektetési dashboardod beállításához másold be a Google Sheets CSV linket."),
      e("input", {
        className: "setup-input", value: url, 
        onChange: ev => setUrl(ev.target.value), placeholder: "https://docs.google.com/spreadsheets/d/e/.../pub?output=csv"
      }),
      e("button", {className: "setup-btn", onClick: () => loadData(url)}, "DASHBOARD MEGNYITÁSA"),
      e("div", {style: {marginTop: 40, padding: 20, background: "#111", borderRadius: 12, border: "1px solid #222"}},
        e("div", {style: {fontSize: 11, fontWeight: 800, color: COLORS.yellow, marginBottom: 10, textTransform: "uppercase"}}, "Szükséges mezők a Sheets-ben:"),
        e("div", {style: {fontSize: 12, color: "#888", lineHeight: 1.8, fontFamily: "monospace"}}, 
          "updated, map_kt, map_fix3, map_fix5, fund_huf, etf_huf, cash_eur, nw_prev_eur, savings_mo, netto"
        )
      )
    );
  }

  if (!data) return e("div", {style: {padding: 100, textAlign: "center", color: "#444", fontWeight: 800}}, "ADATOK BETÖLTÉSE...");

  const map_total = (data.map_kt || 0) + (data.map_fix3 || 0) + (data.map_fix5 || 0);
  const total_huf = map_total + (data.fund_huf || 0) + (data.etf_huf || 0) + ((data.cash_eur || 0) * 400);
  const total_eur = total_huf / 400;

  const allocData = [
    {name: "MÁP (3 kötvény)", value: map_total, color: COLORS.blue},
    {name: "Fundamenta LTP", value: data.fund_huf || 0, color: COLORS.yellow},
    {name: "ETF + Készpénz", value: (data.etf_huf || 0) + ((data.cash_eur || 0) * 400), color: COLORS.green}
  ].filter(d => d.value > 0);

  return e("div", null,
    // TOP SECTION: GOALS
    e("div", {style: {marginBottom: 40}},
      e("span", {className: "label"}, "Mikor érem el? — €350K és €500K"),
      e("div", {className: "grid grid-2"},
        [350000, 500000].map(target => e("div", {className: "card", key: target},
          e("div", {style: {fontSize: 28, fontWeight: 900, marginBottom: 20, fontFamily: "JetBrains Mono"}}, "€ " + target.toLocaleString()),
          [
            {name: "Konzervatív", color: COLORS.yellow, p10: 2036, p50: 2038, p90: 2041},
            {name: "Alap", color: COLORS.blue, p10: 2035, p50: 2037, p90: 2040},
            {name: "Optimista", color: COLORS.green, p10: 2034, p50: 2036, p90: 2039}
          ].map((s, idx) => e("div", {key: s.name, style: {marginBottom: 16}},
            e("div", {className: "flex justify-between items-center", style: {fontSize: 12, marginBottom: 4}},
              e("span", {style: {color: s.color, fontWeight: "bold"}}, s.name),
              e("span", {style: {color: "#555", fontFamily: "JetBrains Mono"}}, `P10: ${s.p10} · P50: ${s.p50} · P90: ${s.p90}`)
            ),
            e("div", {className: "progress-bg"}, 
              e("div", {className: "progress-fill", style: {width: Math.min(100, (total_eur/target)*100) + "%", background: s.color}})
            )
          ))
        ))
      )
    ),

    // MIDDLE SECTION: ANALYSIS
    e("div", {style: {marginBottom: 40}},
      e("span", {className: "label"}, "Portfólió elemzés · " + (data.updated || "LIVE")),
      e("div", {className: "grid grid-2"},
        // PIE CHART CARD
        e("div", {className: "card"},
          e("span", {className: "label", style: {marginBottom: 24}}, "Eszközallokáció"),
          e("div", {className: "grid grid-2", style: {alignItems: "center"}},
            e("div", {style: {height: 200}},
              e(ResponsiveContainer, {width: "100%", height: "100%"},
                e(PieChart, null,
                  e(Pie, {
                    data: allocData, dataKey: "value", innerRadius: 65, outerRadius: 85, stroke: "none", paddingAngle: 6
                  }, allocData.map(d => e(Cell, {key: d.name, fill: d.color})))
                )
              )
            ),
            e("div", {style: {paddingLeft: 20}},
              allocData.map(d => e("div", {className: "legend-item", key: d.name},
                e("div", {className: "flex items-center"},
                  e("div", {className: "legend-dot", style: {background: d.color}}),
                  e("span", {style: {color: "#aaa"}}, d.name)
                ),
                e("div", {style: {textAlign: "right"}},
                  e("div", {className: "mono", style: {fontWeight: "bold"}}, (d.value/total_huf*100).toFixed(1) + "%"),
                  e("div", {className: "mono", style: {fontSize: 10, color: "#444"}}, fE(d.value/400))
                )
              ))
            )
          )
        ),
        // DETAILS TABLE CARD
        e("div", {className: "card"},
          e("span", {className: "label", style: {marginBottom: 15}}, "Eszközök részletezve"),
          e("table", null,
            e("tbody", null,
              [
                {n: "Kincstárjegy 6%", d: "Kötvény", v: data.map_kt, p: "6.0%", c: COLORS.blue},
                {n: "Fix MÁP 3 év 6.5%", d: "Kötvény", v: data.map_fix3, p: "6.5%", c: COLORS.blue},
                {n: "Fix MÁP 5 év 7%", d: "Kötvény", v: data.map_fix5, p: "7.0%", c: COLORS.blue},
                {n: "Fundamenta LTP", d: "Alternatív", v: data.fund_huf, p: "~5.8%", c: COLORS.yellow},
                {n: "ETF (TBSZ25+26)", d: "Részvény", v: data.etf_huf, p: "piaci", c: COLORS.green},
                {n: "Készpénz EUR", d: "Cash", v: (data.cash_eur||0)*400, p: "0%", c: COLORS.green}
              ].filter(r => r.v > 0).map(row => e("tr", {key: row.n},
                e("td", null, e("div", {style: {color: row.c, fontWeight: "bold"}}, "● " + row.n), e("div", {style: {fontSize: 10, color: "#444", marginTop: 2}}, row.d)),
                e("td", {className: "mono", style: {textAlign: "right", fontWeight: "bold"}}, fE(row.v/400)),
                e("td", {className: "mono", style: {textAlign: "right", color: "#555", fontSize: 11}}, row.p)
              ))
            )
          )
        )
      )
    ),

    // RISK BOXES
    e("div", {className: "grid grid-4", style: {marginBottom: 40}},
      [
        {t: "Devizakitettség", l: "HUF (MÁP + Fund.)", p: 85, c: COLORS.yellow, d: "85% HUF kitettség. Minden 1% gyengülés ~0.85% EUR-értékvesztést okoz."},
        {t: "Kockázat / Reál EUR", l: "MÁP (70%)", p: 25, c: COLORS.blue, d: "~2.5% reál EUR hozam. Alacsony kockázatú állampapír túlsúly."},
        {t: "Likviditás", l: "Magas (napok)", p: 15, c: COLORS.green, d: "Elegendő likvid tartalék. A MÁP lejáratok folyamatos cashflow-t adnak."},
        {t: "ETF összetétel", l: "USA-kitettség", p: 78, c: COLORS.purple, d: "78% USA súly. IUSQ-ra való fokozatos áttérés javasolt."}
      ].map(box => e("div", {className: "card", key: box.t},
        e("span", {className: "label", style: {color: box.c, marginBottom: 12}}, box.t),
        e("div", {className: "flex justify-between items-center", style: {fontSize: 12, marginBottom: 6}},
          e("span", null, box.l), e("span", {className: "mono", style: {fontWeight: "bold"}}, box.p + "%")
        ),
        e("div", {className: "progress-bg"}, e("div", {className: "progress-fill", style: {width: box.p + "%", background: box.c}})),
        e("div", {style: {fontSize: 11, marginTop: 15, color: "#666", lineHeight: 1.5}}, box.d)
      ))
    ),

    // STRATEGY NOTES
    e("div", {className: "card", style: {marginBottom: 40}},
      e("span", {className: "label"}, "Stratégiai megjegyzések a nagy célhoz"),
      [
        {t: "ETF arány növelése MÁP lejáratokkor", s: "Magas", c: COLORS.green, d: "A 2027-es és 2028-as lejáratoknál érdemes 65-75% ETF arányt alkalmazni az újrabefektetésnél."},
        {t: "HUF → EUR átmenet tudatosan gyorsítva", s: "Magas", c: COLORS.green, d: "A portfólió 85%-a HUF-ban van. Minden lejárat egy lehetőség a deviza-reallokációra."},
        {t: "TBSZ26 egyszerűsítés: IUSQ-centrikus vásárlás", s: "Közepes", c: COLORS.purple, d: "Az IUSQ önállóan jobban diverzifikált. A SPYL olcsó, de a diverzifikáció hiánya kockázat."},
        {t: "A nagy cél idővonala - realitásvizsgálat", s: "Kontextus", c: COLORS.blue, d: "Alap (7%) forgatókönyvben a 2040-es medián portfólió ~430-470K EUR."}
      ].map(note => e("div", {className: "strategy-card", key: note.t, style: {borderLeftColor: note.c}},
        e("div", {className: "flex justify-between items-center", style: {marginBottom: 6}},
          e("div", {style: {fontWeight: "bold", fontSize: 15}}, note.t),
          e("span", {className: "badge", style: {background: note.c + "15", color: note.c}}, note.s)
        ),
        e("div", {style: {fontSize: 13, color: "#888", lineHeight: 1.4}}, note.d)
      ))
    ),

    // FOOTER
    e("div", {style: {textAlign: "center", borderTop: "1px solid #222", paddingTop: 30}},
      e("button", {
        style: {background: "none", border: "none", color: "#333", fontSize: 11, cursor: "pointer", textDecoration: "underline", fontWeight: 800},
        onClick: () => setIsSetup(true)
      }, "BEÁLLÍTÁSOK MÓDOSÍTÁSA")
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
